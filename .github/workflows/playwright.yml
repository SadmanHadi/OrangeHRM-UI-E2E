name: OrangeHRM E2E Tests

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, edge]

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # ── pnpm ───────────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      # ── Dependencies ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install

      # ── Playwright browsers ─────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: |
          BROWSER="${{ matrix.project }}"
          if [ "$BROWSER" = "edge" ]; then BROWSER="msedge"; fi
          pnpm exec playwright install chromium $BROWSER --with-deps

      # ── Clean up any existing Docker resources ──────────────────────────────
      - name: Clean up existing Docker resources
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
          docker system prune -f || true

      # ── Start OrangeHRM via Docker Compose ─────────────────────────────────
      - name: Start OrangeHRM (Docker)
        run: |
          docker compose up -d
          echo "Waiting for OrangeHRM to become available..."

          # Wait for the application to be responding (Installer first)
          for i in $(seq 1 40); do
            # Check if the service is responding (follow redirects)
            if curl -fsL http://localhost > /dev/null 2>&1; then
              echo "OrangeHRM service is responding!"
              break
            else
              echo "  attempt $i/40 — not ready yet, sleeping 5s..."
            fi
            sleep 5
          done

          # Run automated installation
          echo "Running automated OrangeHRM installation..."
          node scripts/install-orangehrm.js

          # Final check to ensure login page is truly ready
          if ! curl -fsL http://localhost | grep -q "auth-login"; then
            echo "ERROR: OrangeHRM login page failed to render after installation"
            docker compose logs
            exit 1
          fi

      # ── Write .env for the test run ─────────────────────────────────────────
      - name: Create .env
        run: |
          cat <<EOF > .env
          BASE_URL=${{ secrets.BASE_URL }}
          ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          HEADLESS=true
          EOF

      # ── Run UI tests (parallel via matrix) ─────────────────────────────────
      - name: Run E2E tests
        run: pnpm exec playwright test --project=${{ matrix.project }}
        env:
          CI: 'true'
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          HEADLESS: 'true'

      # ── Stop OrangeHRM ───────────────────────────────────────────────────--
      - name: Stop OrangeHRM (Docker)
        if: always()
        run: docker compose down -v

      - name: Upload Monocart report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monocart-report-${{ matrix.project }}
          path: playwright-report/monocart/
          retention-days: 30

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report-${{ matrix.project }}
          path: playwright-report/html/
          retention-days: 30

      - name: Upload test traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.project }}
          path: test-results/
          retention-days: 30
