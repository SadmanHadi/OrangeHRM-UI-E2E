name: OrangeHRM E2E Tests

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, edge]

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # ── pnpm ───────────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      # ── Dependencies ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install

      # ── Playwright browsers ─────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: |
          BROWSER="${{ matrix.project }}"
          if [ "$BROWSER" = "edge" ]; then BROWSER="msedge"; fi
          pnpm exec playwright install chromium $BROWSER --with-deps

      # ── Run UI tests (parallel via matrix) ─────────────────────────────────
      - name: Run E2E tests
        run: pnpm exec playwright test --project=${{ matrix.project }}
        env:
          CI: 'true'
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          HEADLESS: 'true'
          # Pass DB password for installation script if needed by Playwright
          DB_ROOT_PASSWORD: root_password

      - name: Upload Playwright Reports (HTML/JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Test Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.project }}
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Installation Artifacts (Screenshots/Logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installation-artifacts-${{ matrix.project }}
          path: |
            scripts/artifacts/screenshots/
          retention-days: 30
          if-no-files-found: ignore
