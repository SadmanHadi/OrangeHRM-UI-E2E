name: OrangeHRM E2E Tests

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, edge]

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # ── pnpm ───────────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      # ── Dependencies ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install

      # ── Playwright browsers ─────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: |
          BROWSER="${{ matrix.project }}"
          if [ "$BROWSER" = "edge" ]; then BROWSER="msedge"; fi
          pnpm exec playwright install chromium $BROWSER --with-deps

      # ── Clean up any existing Docker resources ──────────────────────────────
      - name: Clean up existing Docker resources
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
          docker system prune -f || true

      # ── Start OrangeHRM via Docker Compose ─────────────────────────────────
      - name: Start OrangeHRM (Docker)
        run: |
          docker compose up -d
          echo "Waiting for OrangeHRM to become available..."
          
          # Wait for the application to be fully ready
          for i in $(seq 1 120); do
            # Check if the service is responding
            if curl -fs http://localhost/orangehrm > /dev/null 2>&1; then
              # Check if the login page is actually rendered (contains username field)
              if curl -fs http://localhost/orangehrm | grep -q "Username"; then
                echo "OrangeHRM is ready!"
                break
              else
                echo "  attempt $i/120 — service responding but login page not ready, sleeping 5s..."
              fi
            else
              echo "  attempt $i/120 — not ready yet, sleeping 5s..."
            fi
            sleep 5
          done
          
          # Final check to ensure service is truly ready
          if ! curl -fs http://localhost/orangehrm | grep -q "Username"; then
            echo "ERROR: OrangeHRM failed to start within 10 minutes"
            docker compose logs
            exit 1
          fi

      # ── Write .env for the test run ─────────────────────────────────────────
      - name: Create .env
        run: |
          cat <<EOF > .env
          BASE_URL=${{ secrets.BASE_URL }}
          ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          HEADLESS=true
          EOF

      # ── Run UI tests (parallel via matrix) ─────────────────────────────────
      - name: Run E2E tests
        run: pnpm exec playwright test --project=${{ matrix.project }}
        env:
          CI: 'true'
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          HEADLESS: 'true'

      # ── Stop OrangeHRM ───────────────────────────────────────────────────--
      - name: Stop OrangeHRM (Docker)
        if: always()
        run: docker compose down -v

      - name: Upload Monocart report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monocart-report-${{ matrix.project }}
          path: playwright-report/monocart/
          retention-days: 30

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report-${{ matrix.project }}
          path: playwright-report/html/
          retention-days: 30

      - name: Upload test traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.project }}
          path: test-results/
          retention-days: 30
